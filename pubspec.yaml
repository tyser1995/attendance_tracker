name: attendance_tracker
description: Attendance Tracking System v2 — Flutter (SQLite / Supabase)
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local DB (Sembast — pure Dart, web-native via IndexedDB)
  sembast: ^3.7.4
  sembast_web: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.5

  # Remote DB (Supabase)
  supabase_flutter: ^2.8.4

  # UI
  fl_chart: ^0.69.0
  table_calendar: ^3.1.3
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Utils
  uuid: ^4.5.1
  crypto: ^3.0.6

  # Export
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.6
  shared_preferences: ^2.3.5
  flutter_dotenv: ^5.2.1

  # Auth methods — QR/Barcode scanning + QR display
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
